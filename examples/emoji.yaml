root_path: output/emoji
overwrite: true
verbose: true

html:
  url: https://space.h-its.org/emoji
  title: Emoji
  aladin_lite_version: 3.6.5

tasks:
  - class_path: hipster.DatasetProjection
    init_args:
      encoder:
        model_path: data/emoji/model/vae/resnet18/S2/encoder.onnx
      data_directory: data/emoji/dataset/data/train-00000-of-00001-38cc4fa96c139e86.parquet
      image_maker:
        class_path: hipster.ImagePlotter
      max_order: 4
      hierarchy: 4
      hips_id: Emoji
      hips_name: Emoji projection dewarped
      hips_path: projection_dewarped
      distortion_correction: true
      skip: true

  - class_path: hipster.DatasetProjection
    init_args:
      encoder:
        model_path: data/emoji/model/vae/resnet18/S2/encoder.onnx
      data_directory: data/emoji/dataset/data/train-00000-of-00001-38cc4fa96c139e86.parquet
      image_maker:
        class_path: hipster.ImagePlotter
      max_order: 4
      hierarchy: 4
      hips_id: Emoji
      hips_name: Emoji projection
      hips_path: projection
      distortion_correction: false
      skip: true

  - class_path: hipster.HiPSGenerator
    init_args:
      decoder:
        model_path: data/emoji/model/vae/resnet18/S2/decoder.onnx
        input_name: z
      image_maker:
        class_path: hipster.ImagePlotter
      max_order: 4
      hierarchy: 4
      hips_id: Emoji
      hips_name: Emoji model
      hips_path: model
      distortion_correction: true
      skip: true

  - class_path: hipster.VOTableGenerator
    init_args:
      encoder:
        model_path: data/emoji/model/vae/resnet18/S2/encoder.onnx
      data_directory: data/emoji/dataset/data/train-00000-of-00001-38cc4fa96c139e86.parquet
      dataset: emoji
      output_file: emoji.vot
      color: red
      shape: circle
      size: 5
