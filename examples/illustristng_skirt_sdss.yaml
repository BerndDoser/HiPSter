root_path: output/IllustrisTNG_SKIRT_SDSS
overwrite: true
verbose: true

html:
  url: https://space.h-its.org/IllustrisTNG_SKIRT_SDSS
  title: HiPSter representation of IllustrisTNG SKIRT SDSS
  aladin_lite_version: 3.6.5

tasks:
  - class_path: hipster.HiPSGenerator
    init_args:
      decoder:
        model_path: data/illustris_tng_skirt_sdss/model/vae/resnet18/Perceptual/S2/decoder.onnx
        input_name: z
      image_maker:
        class_path: hipster.ImagePlotter
      max_order: 4
      hierarchy: 4
      hips_id: IllustrisTNG SKIRT SDSS
      hips_name: IllustrisTNG SKIRT SDSS model
      hips_path: model

  - class_path: hipster.DatasetProjection
    init_args:
      encoder:
        model_path: data/illustris_tng_skirt_sdss/model/vae/resnet18/Perceptual/S2/encoder.onnx
      data_directory: data/illustris_tng_skirt_sdss/dataset/data/train-00000-of-00001.parquet
      image_maker:
        class_path: hipster.ImagePlotter
      max_order: 4
      hierarchy: 4
      hips_id: IllustrisTNG SKIRT SDSS
      hips_name: IllustrisTNG SKIRT SDSS projection dewarped
      hips_path: projection_dewarped
      distortion_correction: true

  - class_path: hipster.VOTableGenerator
    init_args:
      encoder:
        model_path: data/illustris_tng_skirt_sdss/model/vae/resnet18/Perceptual/S2/encoder.onnx
      data_directory: data/illustris_tng_skirt_sdss/dataset/
      color: red
      shape: circle
      size: 5